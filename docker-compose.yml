services:
  db:
    image: postgres:17-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quibble
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - quibble_net

  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    environment:
      RUSTFS_VOLUMES: "/data/rustfs{0..3}"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: "rustfsadmin"
      RUSTFS_SECRET_KEY: "rustfsadmin"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fs http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - quibble_net

  mc:
    image: minio/mc
    container_name: mc
    depends_on:
      rustfs:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./scripts/init-rustfs.sh:/init-rustfs.sh:ro
    entrypoint: ["/bin/sh", "/init-rustfs.sh"]
    restart: "no"
    networks:
      - quibble_net

  avatars:
    image: goquibble/avatars
    container_name: avatars
    ports:
      - "8001:80"

volumes:
  db_data:
  redis_data:
  rustfs_data:

networks:
  quibble_net:
    name: quibble_net
    driver: bridge
